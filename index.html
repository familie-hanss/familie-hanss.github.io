<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Detecting your Language</title>
    <script>
        function redirectLanguage() {
            const userLang = navigator.language || navigator.userLanguage; 
            
            const langCode = userLang.substring(0, 2);

            if (langCode === "de") {
                window.location.href = "/de/";
            } else if (langCode === "en") {
                window.location.href = "/en/";
            } else {
                window.location.href = "/en/";
            }
        }

        redirectLanguage();
    </script>
</head>
<body>
    <p>Falls Sie nicht automatisch weitergeleitet werden, klicken Sie bitte <a href="/en/">hier</a>.</p>
</body>
</html>
